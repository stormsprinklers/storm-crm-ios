name: StormCRM
options:
  bundleIdPrefix: com.stormsprinklers
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: StormCRM/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.stormsprinklers.stormcrm
    DEVELOPMENT_TEAM: ""
targets:
  StormCRM:
    type: application
    platform: iOS
    sources:
      - path: StormCRM
        excludes:
          - Resources/Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: StormCRM/Resources/StormCRM.entitlements
    scheme:
      environmentVariables:
        - variable: API_BASE_URL
          value: http://localhost:3000
          isEnabled: true
